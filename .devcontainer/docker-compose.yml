name: "revotale_blog_devcontainer"

services:
  devcontainer:
    image: mcr.microsoft.com/devcontainers/go:2.1-1.26-trixie
    command: sleep infinity
    depends_on:
      cms:
        condition: service_started
      imgproxy:
        condition: service_started
    environment:
      BLOG_LISTEN_ADDR: :8081
      BLOG_ROOT_URL: http://${LOCAL_DOMAIN}:${BLOG_PUBLIC_PORT}
      BLOG_GRAPHQL_ENDPOINT: http://cms:3000/api/graphql
      BLOG_ENABLE_IMAGE_LOADER: "1"
    networks:
      - blog_net
    volumes:
      - ..:/workspaces/blog
    working_dir: /workspaces/blog

  cms_postgres:
    image: postgres:18.3
    command:
      - postgres
      - -c
      - log_min_messages=WARNING
    environment:
      POSTGRES_USER: ${CMS_DB_USER}
      POSTGRES_PASSWORD: ${CMS_DB_PASSWORD}
      POSTGRES_DB: ${CMS_DB_NAME}
    networks:
      - blog_net
    restart: unless-stopped
    volumes:
      - cms_postgres_data:/var/lib/postgresql

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY_ID}
      RUSTFS_SECRET_KEY: ${S3_SECRET_ACCESS_KEY}
      RUSTFS_OBS_LOGGER_LEVEL: info
    networks:
      - blog_net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs

  setup-rustfs:
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      rustfs:
        condition: service_started
    command:
      - /bin/sh
      - -c
      - |
        until mc alias set local ${S3_ENDPOINT} ${S3_ACCESS_KEY_ID} ${S3_SECRET_ACCESS_KEY}; do sleep 2; done
        until mc mb --ignore-existing local/${S3_BUCKET}; do sleep 2; done
        mc anonymous set download local/${S3_BUCKET} || true
    networks:
      - blog_net
    restart: "no"

  cms:
    image: ghcr.io/revotale/cms:latest
    depends_on:
      cms_postgres:
        condition: service_started
      rustfs:
        condition: service_started
    environment:
      APP_URL: http://${LOCAL_DOMAIN}:${BLOG_PUBLIC_PORT}
      NEXT_PUBLIC_SERVER_URL: http://${LOCAL_DOMAIN}:${CMS_PUBLIC_PORT}
      PAYLOAD_PUBLIC_SERVER_URL: http://${LOCAL_DOMAIN}:${CMS_PUBLIC_PORT}
      GRAPHQL_URL: http://${LOCAL_DOMAIN}:${CMS_PUBLIC_PORT}/api/graphql
      GRAPHQL_SERVER_URL: http://cms:3000/api/graphql
      PAYLOAD_AUTH_COOKIE_DOMAIN: ${LOCAL_DOMAIN}
      DATABASE_URI: postgresql://${CMS_DB_USER}:${CMS_DB_PASSWORD}@${CMS_DB_HOST}:5432/${CMS_DB_NAME}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_PUBLIC_DRAFT_SECRET: ${PAYLOAD_PUBLIC_DRAFT_SECRET}
      NEXT_PRIVATE_DRAFT_SECRET: ${NEXT_PRIVATE_DRAFT_SECRET}
      REVALIDATION_KEY: ${REVALIDATION_KEY}
      NEXT_PRIVATE_REVALIDATION_KEY: ${NEXT_PRIVATE_REVALIDATION_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_REGION: ${S3_REGION}
      ENABLE_CRON: ${ENABLE_CRON}
      NEXT_PUBLIC_IS_LIVE: ${NEXT_PUBLIC_IS_LIVE}
    networks:
      - blog_net
    restart: unless-stopped

  imgproxy:
    image: ghcr.io/revotale/infrastructure-imgproxy:latest
    environment:
      IMGPROXY_ALLOWED_SOURCES: http://devcontainer:8081/,http://cms:3000/,http://rustfs:9000/
    networks:
      - blog_net
    restart: unless-stopped

  proxy:
    image: nginx:1.29-alpine
    depends_on:
      devcontainer:
        condition: service_started
      cms:
        condition: service_started
      imgproxy:
        condition: service_started
    networks:
      - blog_net
    ports:
      - "${BLOG_PUBLIC_PORT}:80"
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  blog_net:
    driver: bridge

volumes:
  cms_postgres_data:
  rustfs_data:
  rustfs_logs:
