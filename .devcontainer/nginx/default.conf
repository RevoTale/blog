server {
  listen 80;
  server_name _;

  location ~ ^/cdn/image/relative/(16|32|48|64|96|128|256|384|450|530|640|750|828|1080|1200|1920|2048|3840)/(.*)$ {
    proxy_pass http://imgproxy:8080/unsafe/width:$1/plain/http://cms:3000/$2$is_args$args;
  }

  location ~ ^/cdn/image/blog/(16|32|48|64|96|128|256|384|450|530|640|750|828|1080|1200|1920|2048|3840)/(.*)$ {
    proxy_pass http://imgproxy:8080/unsafe/width:$1/plain/http://devcontainer:8081/$2$is_args$args;
  }

  location ~ ^/cdn/image/s3/(16|32|48|64|96|128|256|384|450|530|640|750|828|1080|1200|1920|2048|3840)/(.*)$ {
    proxy_pass http://imgproxy:8080/unsafe/width:$1/plain/http://rustfs:9000/cms/$2$is_args$args;
  }

  location / {
    proxy_http_version 1.1;
    proxy_pass http://devcontainer:8081;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
